graph_name: nonconverging_chain_meeting_template

run_chain: true

# The non-random meeting structure is already symmetrically split at t=0:
# two parallel copies of F12 connect X1-X2 and two parallel copies of F23
# connect X2-X3. The copies keep the full pasted table, matching the diagram.
symmetric_chain_split: true
symmetric_chain_copies: 2
symmetric_chain_cost_scale: 1.0

variable_order: ["X1", "X2", "X3"]
domain_values: [0, 1]

# Paste the exact meeting example here.
# Required primary structure:
#   X1 -- F12_1/F12_2 -- X2 -- F23_1/F23_2 -- X3
# The table axis order is the same as the variables list for each factor.
cost_tables:
  - name: F12
    variables: ["X1", "X2"]
    table:
      # Replace null with a 2x2 table, for example:
      # [[c00, c01],
      #  [c10, c11]]
      null
  - name: F23
    variables: ["X2", "X3"]
    table:
      null

max_iter: 200
tolerance: 1.0e-9
trace_every: 1
output_dir: results/non_convergence_chain
seed: 0

# Random-graph studies are outside this minimal standard-chain slice.
random_graph:
  enabled: false
